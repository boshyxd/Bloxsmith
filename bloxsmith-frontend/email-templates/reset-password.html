<table width="100%" cellpadding="0" cellspacing="0" style="background-color:#0f0f0f;padding:40px 0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,monospace">
  <tr>
    <td align="center">
      <table width="460" cellpadding="0" cellspacing="0" style="background-color:#1a1a1a;border:1px solid rgba(255,255,255,0.1)">
        <tr>
          <td style="padding:32px 32px 24px">
            <img src="https://bloxsmith.net/logos/bloxsmith-wordmark.svg" alt="Bloxsmith" height="24" style="display:block" />
          </td>
        </tr>
        <tr>
          <td style="padding:0 32px">
            <h1 style="margin:0 0 12px;font-size:20px;font-weight:600;color:#ededed;letter-spacing:-0.3px">
              Reset your password
            </h1>
            <p style="margin:0 0 24px;font-size:14px;line-height:1.6;color:#a3a3a3">
              Click the button below to set a new password for your Bloxsmith account.
            </p>
          </td>
        </tr>
        <tr>
          <td style="padding:0 32px">
            <a href="{{ .ConfirmationURL }}" style="display:inline-block;padding:10px 24px;background-color:#ededed;color:#0f0f0f;font-size:13px;font-weight:600;text-decoration:none;letter-spacing:0.2px">
              Reset Password
            </a>
          </td>
        </tr>
        <tr>
          <td style="padding:24px 32px 32px">
            <p style="margin:0;font-size:12px;line-height:1.5;color:#666">
              If you didn't request a password reset, ignore this email. The link expires in 24 hours.
            </p>
          </td>
        </tr>
      </table>
    </td>
  </tr>
</table>
